<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Race — RAD Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    h1 { font-size: 48px; font-weight: 900; color: #FF4500; letter-spacing: 4px; }
    h2 { font-size: 20px; font-weight: 300; letter-spacing: 8px; margin-bottom: 32px; }
    .message {
      font-size: 18px;
      color: #d1d5db;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .open-btn {
      display: inline-block;
      background: #FF4500;
      color: #fff;
      padding: 16px 48px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .download {
      font-size: 14px;
      color: #9ca3af;
    }
    .download a { color: #FF4500; }
  </style>
  <script>
    const path = window.location.pathname;
    const match = path.match(/\/join\/([a-zA-Z0-9-]+)/);
    if (match) {
      const raceId = match[1];
      window.location.href = `radtimer://join?raceId=${raceId}`;
    }
  </script>
</head>
<body>
  <h1>RAD</h1>
  <h2>TIMER</h2>
  <p class="message">
    You've been invited to a race! Open this link in the RAD Timer app to join.
  </p>
  <a id="open-link" class="open-btn" href="#">Open in RAD Timer</a>
  <p class="download">
    Don't have the app? Download it on the
    <a href="#">App Store</a> or
    <a href="#">Google Play</a>.
  </p>
  <script>
    const p = window.location.pathname;
    const m = p.match(/\/join\/([a-zA-Z0-9-]+)/);
    if (m) {
      document.getElementById('open-link').href = `radtimer://join?raceId=${m[1]}`;
    }
  </script>
</body>
</html>
